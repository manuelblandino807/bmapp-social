<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profilo Social</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: #1c1c1c;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
  width: 90%;
  max-width: 420px;
}

.logo {
  width: 60px;
  margin-bottom: 10px;
  opacity: 0.9;
}

h2 {
  margin: 0 0 20px 0;
  font-size: 24px;
  word-break: break-word;
}

.socials {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 15px;
}

.socials a {
  width: 54px;
  height: 54px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  color: white;
  text-decoration: none;
  transition: transform 0.2s ease;
}

.socials a:hover {
  transform: scale(1.08);
}

#instagramBtn { background: #E1306C; }
#facebookBtn { background: #1877F2; }
#tiktokBtn { background: #000000; border: 1px solid #333; }
#telegramBtn { background: #0088cc; }
#whatsappBtn { background: #25D366; }

.footer {
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.6;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="card">

  <!-- LOGO APP -->
  <img src="Logo_B-M_app_2.png" class="logo">

  <h2 id="name">Utente</h2>

  <div class="socials">
    <a id="instagramBtn" class="hidden" target="_blank"><i class="fab fa-instagram"></i></a>
    <a id="facebookBtn" class="hidden" target="_blank"><i class="fab fa-facebook-f"></i></a>
    <a id="tiktokBtn" class="hidden" target="_blank"><i class="fab fa-tiktok"></i></a>
    <a id="telegramBtn" class="hidden" target="_blank"><i class="fab fa-telegram-plane"></i></a>
    <a id="whatsappBtn" class="hidden" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>

  <!-- FIRMA -->
  <div class="footer">
    Powered by B-M App
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const name = params.get("nome") || "Utente";
const instagram = params.get("instagram") || "";
const tiktok = params.get("tiktok") || "";
const facebook = params.get("facebook") || "";
const telegram = params.get("telegram") || "";
const whatsapp = params.get("whatsapp") || "";

document.getElementById("name").textContent = name;

function setupButton(id, value, prefix) {
  if (!value) return;
  const btn = document.getElementById(id);
  btn.href = prefix + value;
  btn.classList.remove("hidden");
}

setupButton("instagramBtn", instagram, "https://instagram.com/");
setupButton("facebookBtn", facebook, "https://facebook.com/");
setupButton("tiktokBtn", tiktok, "https://www.tiktok.com/@");
setupButton("telegramBtn", telegram, "https://t.me/");
setupButton("whatsappBtn", whatsapp, "https://wa.me/");
</script>

</body>
</html>
